# =============================================================================
# nginx-rtmp.conf -- REFERENCE ARCHITECTURALE (non utilise directement)
# =============================================================================
# Ce fichier documente la structure de configuration nginx pour Orbis Alternis.
# Le script diffuser.sh GENERE directement /etc/nginx/orbis-rtmp-block.conf
# avec les vraies valeurs (cles de flux, ports...).
# Ne pas copier ce fichier manuellement dans sites-enabled/.
#
# ARCHITECTURE nginx pour Orbis Alternis :
#
#   /etc/nginx/nginx.conf          <- fichier principal (non modifie sauf 2 ajouts)
#     |-- load_module ngx_rtmp_module.so;   (ajoute/decommente par le script)
#     |-- http { ... }                       (inchange)
#     |-- include /etc/nginx/orbis-rtmp-block.conf;  (ajoute en fin de fichier)
#
#   /etc/nginx/orbis-rtmp-block.conf  <- genere par diffuser.sh (bloc rtmp)
#   /etc/nginx/sites-enabled/orbis-stats.conf  <- serveur HTTP stats (port 8088)
#
# POURQUOI ne pas utiliser sites-enabled/ pour rtmp {} ?
#   sites-enabled/ est inclus DANS le bloc http {} de nginx.conf.
#   Les directives rtmp {}, events {} et load_module sont de niveau RACINE
#   et ne peuvent pas etre imbriquees dans http {}.
# =============================================================================

# --- Contenu de /etc/nginx/orbis-rtmp-block.conf (genere automatiquement) ---
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_message 1M;

        application diffusion {
            live on;
            record off;
            allow publish 127.0.0.1;
            deny publish all;
            allow play all;

            # DLive (RTMP direct)
            push rtmp://stream.dlive.tv/live/VOTRE_CLE_DLIVE;

            # Kick (via Stunnel local -> RTMPS)
            push rtmp://127.0.0.1:11935/app/VOTRE_CLE_KICK;
        }
    }
}

